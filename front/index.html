<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Memory Graph</title>

  <!-- Bootstrap 5 (CDN) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <style>
    html, body { height: 100%; }
    #graph { width: 100%; height: 70vh; border: 1px solid var(--bs-border-color); border-radius: .5rem; background: #0f1011; }
    .entity-card { cursor: pointer; }
    .entity-card:hover { border-color: #5e6ad2; }
    .obs-item { font-size: .8rem; color: var(--bs-secondary-color); }
    .type-badge { font-size: .7rem; }
    .stat-num { font-size: 1.6rem; font-weight: 600; }
    #status { min-height: 1.5rem; }
    .vis-tooltip {
      background-color: #141516 !important;
      color: #f7f8f8 !important;
      border: 1px solid #34343a !important;
      border-radius: 6px !important;
      font-family: monospace !important;
      white-space: pre-line !important;
    }

    /* Linear design-system tokens (DESIGN.md) */
    [data-bs-theme="dark"] {
      --bs-body-bg: #010102;        /* canvas */
      --bs-body-color: #f7f8f8;     /* ink */
      --bs-border-color: #23252a;   /* hairline */
      --bs-secondary-color: #8a8f98;/* ink-subtle */
      --bs-tertiary-color: #62666d; /* ink-tertiary */
      --bs-emphasis-color: #f7f8f8; /* ink */
      --bs-dark: #010102;           /* canvas (navbar) */
    }
    body {
      background: #010102;
      color: #f7f8f8;
      font-family: 'Inter', -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
    }
    .navbar {
      background: #010102 !important;
      min-height: 56px;
    }
    .navbar-brand, h1, h6 {
      letter-spacing: -0.02em;
    }
    .card {
      background: #0f1011;          /* surface-1 */
      border: 1px solid #23252a;    /* hairline */
      border-radius: 12px;          /* lg */
    }
    .form-control, .form-select {
      background: #0f1011;          /* surface-1 */
      color: #f7f8f8;               /* ink */
      border-color: #23252a;        /* hairline */
      border-radius: 8px;           /* md */
    }
    .form-control:focus, .form-select:focus {
      background: #0f1011;
      color: #f7f8f8;
      border-color: #5e69d1;        /* primary-focus */
      box-shadow: 0 0 0 .25rem rgba(94, 105, 209, .5);
    }
    .btn-secondary {
      background: #0f1011;          /* surface-1 */
      color: #f7f8f8;               /* ink */
      border-color: #23252a;        /* hairline */
      border-radius: 8px;           /* md */
    }
    .btn-secondary:hover, .btn-secondary:focus {
      background: #141516;          /* surface-2 */
      color: #f7f8f8;
      border-color: #34343a;        /* hairline-strong */
    }
    .badge {
      background: #141516;          /* surface-2 */
      color: #d0d6e0;               /* ink-muted */
      border-radius: 9999px;        /* pill */
    }
    .container-fluid {
      max-width: 1280px;
      margin-inline: auto;
    }
  </style>
</head>
<body>
  <nav class="navbar sticky-top border-bottom">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">🧠 Agent Memory Graph</span>
      <span class="text-secondary small">agnostic-agent · knowledge graph viewer</span>
    </div>
  </nav>

  <div class="container-fluid py-3">
    <!-- Stats -->
    <div class="row g-2 mb-3">
      <div class="col-4 col-md-2">
        <div class="card text-center"><div class="card-body py-2">
          <div class="stat-num" id="stat-entities">0</div>
          <div class="text-secondary small">Entidades</div>
        </div></div>
      </div>
      <div class="col-4 col-md-2">
        <div class="card text-center"><div class="card-body py-2">
          <div class="stat-num" id="stat-relations">0</div>
          <div class="text-secondary small">Relações</div>
        </div></div>
      </div>
      <div class="col-4 col-md-2">
        <div class="card text-center"><div class="card-body py-2">
          <div class="stat-num" id="stat-observations">0</div>
          <div class="text-secondary small">Observações</div>
        </div></div>
      </div>
      <div class="col-4 col-md-2">
        <div class="card text-center"><div class="card-body py-2">
          <div class="stat-num text-warning" id="stat-stale">0</div>
          <div class="text-secondary small">Stale/Ghost</div>
        </div></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="row g-2 align-items-end mb-2">
      <div class="col-12 col-md-4">
        <label class="form-label small mb-1">Carregar arquivo (.jsonl)</label>
        <input type="file" id="file-input" class="form-control form-control-sm" accept=".jsonl,.json,.txt" />
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label small mb-1">Buscar (nome/tipo)</label>
        <input type="text" id="search-input" class="form-control form-control-sm" placeholder="ex.: agent, Pattern, Provider..." />
      </div>
      <div class="col-8 col-md-3">
        <label class="form-label small mb-1">Filtrar por tipo</label>
        <select id="type-filter" class="form-select form-select-sm">
          <option value="">Todos os tipos</option>
        </select>
      </div>
      <div class="col-8 col-md-3">
        <label class="form-label small mb-1">Filtrar por role</label>
        <select id="role-filter" class="form-select form-select-sm">
          <option value="">Todos os roles</option>
        </select>
      </div>
      <div class="col-4 col-md-1 d-grid">
        <button id="reset-btn" class="btn btn-sm btn-secondary">Reset</button>
      </div>
    </div>
    <div id="status" class="small text-secondary mb-2"></div>

    <!-- Graph -->
    <div id="graph"></div>

    <!-- Lists -->
    <div class="row mt-3 g-3">
      <div class="col-12 col-lg-6">
        <h6 class="text-secondary">Entidades</h6>
        <div id="entity-list" class="d-flex flex-column gap-2"></div>
      </div>
      <div class="col-12 col-lg-6">
        <h6 class="text-secondary">Relações</h6>
        <div id="relation-list" class="d-flex flex-column gap-1"></div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <!-- vis-network (graph plotting) -->
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>

  <script>
    "use strict";

    // ---- Palette for entity types ----
    const TYPE_COLORS = {
      Project:   "#5e6ad2",
      Module:    "#27a644",
      Package:   "#828fff",
      TechStack: "#d0d6e0",
      Integration:"#7a7fad",
      Pattern:   "#e0a458",
      Feature:   "#5ec8d8",
    };
    const FALLBACK_COLOR = "#8a8f98";

    // ---- Palette for functional roles (MemGuard isolation) ----
    const ROLE_COLORS = {
      architecture:  "#5e6ad2",
      user_profile:  "#27a644",
      episodic:      "#e0a458",
      rule:          "#d6455d",
      decision:      "#5ec8d8",
      preference:    "#828fff",
      project_state: "#c77dff",
      feedback:      "#7a7fad",
    };
    const ROLE_FALLBACK = "#8a8f98";

    // ---- State badge styling ----
    const STATE_BADGE = {
      current:    "text-bg-success",
      historical: "text-bg-secondary",
      transition: "text-bg-warning",
    };
    function stateBadgeHtml(state) {
      const cls = STATE_BADGE[state] || "text-bg-secondary";
      return `<span class="badge type-badge ${cls}">${escapeHtml(state || "current")}</span>`;
    }

    let ALL = { entities: [], relations: [], observations: [] };
    let network = null;
    let container = null;

    // ---- JSONL parsing ----
    // Default-safe field resolution (backward compatible with flat records).
    function normEntity(e) {
      e.entityType = e.entityType || "Unknown";
      e.role = e.role || "architecture";
      e.state = e.state || "current";
      e.confidence = e.confidence || "high";
      e.observations = e.observations || [];
      e.access_count = e.access_count || 0;
      return e;
    }
    function normRelation(r) {
      r.state = r.state || "current";
      return r;
    }
    function normObservation(o) {
      o.state = o.state || "current";
      o.confidence = o.confidence || "high";
      return o;
    }

    function parseJSONL(text) {
      const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
      const entities = [], relations = [], observations = [];
      for (const line of lines) {
        let obj;
        try { obj = JSON.parse(line); }
        catch (e) { console.warn("Linha ignorada (JSON inválido):", line); continue; }
        if (!obj || typeof obj !== "object" || !obj.type) continue;
        if (obj.type === "entity") entities.push(normEntity(obj));
        else if (obj.type === "relation") relations.push(normRelation(obj));
        else if (obj.type === "observation") observations.push(normObservation(obj));
      }
      // Merge observations into their entities (carry state/confidence for display)
      const byName = new Map(entities.map(e => [e.name, e]));
      for (const obs of observations) {
        const ent = byName.get(obs.entityName);
        if (ent) {
          ent.observations = ent.observations.concat(obs.contents || []);
          // If any observation is historical/transition, surface it on the entity for the ghost flag.
          if (obs.state && obs.state !== "current") ent._hasNonCurrentObs = true;
        }
      }
      // Ghost detection: an entity that has BOTH a current and a historical/transition version,
      // or is the target of a SUPERSEDED_BY relation.
      const superseded = new Set(
        relations.filter(r => r.relationType === "SUPERSEDED_BY").map(r => r.from)
      );
      for (const e of entities) {
        e._ghost = superseded.has(e.name) || !!e._hasNonCurrentObs;
      }
      return { entities, relations, observations };
    }

    // ---- Build vis-network datasets ----
    function buildDatasets(entities, relations) {
      const nodes = entities.map(e => {
        const color = TYPE_COLORS[e.entityType] || FALLBACK_COLOR;
        const obs = (e.observations || []).join("\n");
        const meta = [
          "[" + (e.entityType || "?") + "]",
          "role: " + (e.role || "architecture"),
          "state: " + (e.state || "current"),
          "confidence: " + (e.confidence || "high"),
        ].join("\n");
        const isHistorical = (e.state || "current") === "historical";
        const borderStyle = isHistorical ? "dotted" : "solid";
        return {
          id: e.name,
          label: e.name,
          group: e.entityType,
          title: meta + (obs ? "\n\n" + obs : "\n" + e.name),
          color: {
            background: color,
            border: e._ghost ? "#e0a458" : color,
            highlight: { background: "#fff", border: e._ghost ? "#e0a458" : color },
          },
          borderWidth: e._ghost ? 3 : 2,
          shapeProperties: { borderDashes: isHistorical ? [4, 3] : false },
          font: { color: "#f7f8f8" },
        };
      });
      const edges = relations.map(r => {
        const isHistorical = (r.state || "current") === "historical";
        return {
          from: r.from,
          to: r.to,
          label: r.relationType,
          arrows: "to",
          dashes: isHistorical,
          font: { color: "#8a8f98", size: 10, strokeWidth: 0, background: "none" },
          color: { color: isHistorical ? "#5a5a5a" : "#34343a", highlight: "#5e6ad2" },
          smooth: { type: "cubicBezier", roundness: 0.4 },
        };
      });
      return {
        nodes: new vis.DataSet(nodes),
        edges: new vis.DataSet(edges),
      };
    }

    // ---- Render graph ----
    function renderGraph(entities, relations) {
      const { nodes, edges } = buildDatasets(entities, relations);
      const data = { nodes, edges };
      const options = {
        nodes: { shape: "dot", size: 14, borderWidth: 2 },
        edges: { width: 1.5 },
        groups: Object.fromEntries(
          Object.entries(TYPE_COLORS).map(([k, v]) => [k, { color: { background: v, border: v }, font: { color: "#f7f8f8" } }])
        ),
        physics: {
          stabilization: { iterations: 200 },
          barnesHut: { gravitationalConstant: -12000, springLength: 120, springConstant: 0.04 },
        },
        interaction: { hover: true, tooltipDelay: 120, navigationButtons: true, keyboard: false },
      };
      if (!network) {
        network = new vis.Network(container, data, options);
      } else {
        network.setData(data);
        network.setOptions(options);
      }
    }

    // ---- Render side lists ----
    function renderLists(entities, relations) {
      const el = document.getElementById("entity-list");
      el.innerHTML = "";
      for (const e of entities) {
        const card = document.createElement("div");
        card.className = "card entity-card" + (e._ghost ? " border-warning" : "");
        const stateBadge = stateBadgeHtml(e.state || "current");
        const roleBadge = `<span class="badge type-badge text-bg-light">${escapeHtml(e.role || "architecture")}</span>`;
        const ghostBadge = e._ghost ? `<span class="badge type-badge text-bg-warning">ghost</span>` : "";
        const obsHtml = (e.observations || []).map(o => `<div class="obs-item">• ${escapeHtml(o)}</div>`).join("");
        card.innerHTML = `
          <div class="card-body py-2">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-1">
              <span class="fw-semibold">${escapeHtml(e.name)}</span>
              <span class="d-flex gap-1">
                ${stateBadge}
                ${roleBadge}
                ${ghostBadge}
              </span>
            </div>
            ${obsHtml}
          </div>`;
        card.addEventListener("click", () => focusNode(e.name));
        el.appendChild(card);
      }

      const rl = document.getElementById("relation-list");
      rl.innerHTML = "";
      for (const r of relations) {
        const item = document.createElement("div");
        item.className = "small";
        item.innerHTML = `<span class="text-info">${escapeHtml(r.from)}</span> <span class="text-secondary">—${escapeHtml(r.relationType)}→</span> <span class="text-warning">${escapeHtml(r.to)}</span>`;
        rl.appendChild(item);
      }
    }

    function focusNode(name) {
      if (network && network.body.data.nodes.get(name)) {
        network.selectNodes([name]);
        network.focus(name, { scale: 1.1, animation: true });
      }
    }

    // ---- Stats + type/role filters ----
    function updateStats() {
      document.getElementById("stat-entities").textContent = ALL.entities.length;
      document.getElementById("stat-relations").textContent = ALL.relations.length;
      document.getElementById("stat-observations").textContent = ALL.observations.length;

      const staleCount = ALL.entities.filter(e => (e.state || "current") !== "current").length
        + ALL.relations.filter(r => (r.state || "current") !== "current").length;
      document.getElementById("stat-stale").textContent = staleCount;

      const typeSel = document.getElementById("type-filter");
      const currentType = typeSel.value;
      const types = [...new Set(ALL.entities.map(e => e.entityType).filter(Boolean))].sort();
      typeSel.innerHTML = '<option value="">Todos os tipos</option>' +
        types.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join("");
      if (types.includes(currentType)) typeSel.value = currentType;

      const roleSel = document.getElementById("role-filter");
      const currentRole = roleSel.value;
      const roles = [...new Set(ALL.entities.map(e => e.role || "architecture").filter(Boolean))].sort();
      roleSel.innerHTML = '<option value="">Todos os roles</option>' +
        roles.map(r => `<option value="${escapeHtml(r)}">${escapeHtml(r)}</option>`).join("");
      if (roles.includes(currentRole)) roleSel.value = currentRole;
    }

    // ---- Apply search + type + role filter ----
    function applyFilters() {
      const q = document.getElementById("search-input").value.trim().toLowerCase();
      const type = document.getElementById("type-filter").value;
      const role = document.getElementById("role-filter").value;
      const ents = ALL.entities.filter(e => {
        const matchType = !type || e.entityType === type;
        const matchRole = !role || (e.role || "architecture") === role;
        const matchQ = !q ||
          (e.name || "").toLowerCase().includes(q) ||
          (e.entityType || "").toLowerCase().includes(q) ||
          (e.role || "").toLowerCase().includes(q) ||
          (e.observations || []).some(o => o.toLowerCase().includes(q));
        return matchType && matchRole && matchQ;
      });
      const names = new Set(ents.map(e => e.name));
      const rels = ALL.relations.filter(r => names.has(r.from) && names.has(r.to));
      renderGraph(ents, rels);
      renderLists(ents, rels);
    }

    // ---- Load + display ----
    function loadData(text, sourceLabel) {
      try {
        ALL = parseJSONL(text);
        updateStats();
        applyFilters();
        setStatus(`Carregado de ${sourceLabel}: ${ALL.entities.length} entidades, ${ALL.relations.length} relações, ${ALL.observations.length} observações.`, "ok");
      } catch (err) {
        setStatus("Erro ao processar o arquivo: " + err.message, "err");
        console.error(err);
      }
    }

    function setStatus(msg, kind) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = "small " + (kind === "err" ? "text-danger" : "text-secondary");
    }

    function escapeHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    // ---- Wire up events ----
    document.getElementById("file-input").addEventListener("change", (ev) => {
      const file = ev.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => loadData(reader.result, file.name);
      reader.onerror = () => setStatus("Falha ao ler o arquivo.", "err");
      reader.readAsText(file);
    });
    document.getElementById("search-input").addEventListener("input", applyFilters);
    document.getElementById("type-filter").addEventListener("change", applyFilters);
    document.getElementById("role-filter").addEventListener("change", applyFilters);
    document.getElementById("reset-btn").addEventListener("click", () => {
      document.getElementById("search-input").value = "";
      document.getElementById("type-filter").value = "";
      document.getElementById("role-filter").value = "";
      applyFilters();
    });

    // ---- Auto-load from the server endpoint (started with the project) ----
    container = document.getElementById("graph");
    (async function autoLoad() {
      try {
        const res = await fetch("/api/memory.jsonl", { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const text = await res.text();
        loadData(text, "/api/memory.jsonl");
      } catch (e) {
        setStatus("Auto-carregamento falhou. O servidor do frontend pode não estar rodando. Use o seletor de arquivo acima para carregar o memory_graph.jsonl manualmente.", "err");
      }
    })();
  </script>
</body>
</html>
